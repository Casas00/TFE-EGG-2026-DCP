<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="author" content="David Casas"/>
    <meta name="description" content="Geodata Explorer"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>CTTC Geodata Explorer</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="icon" type="image/png" href="/favicon_cttc.png">
  </head>
  <body>

    <!--
      ------------------------------------------------------------
                  CTTC DATA VIEWER - HTML STRUCTURE
      ------------------------------------------------------------
      This file defines the main HTML container required by the 
      JavaScript Modules. No business logic exists here; only the 
      structural elements that OpenLayers will need.
      ============================================================
      - All element styling is located in style.css
      - Interactive Behavior is located in JS modules under src/
    -->

  <!-- ============================= 
              APPLICATION HEADER
      ============================= -->

      <!-- Application Header 
            Institucional identtiy bar.
            Contains CTTC logo and viewer title.
            Styling handled in style.css 
      -->
      <header id="app-header">

        <!-- Institucional Logo-->
         <div id="header-logo">
            <a id="header-logo" href="https://www.cttc.cat" target="_blank" title="Ir a CTTC">
                <img src="src\assets\img\Logo_CTTC_v1_BLanc_TTE (1).png" alt="CTTC logo">
            </a>
        </div>
         

         <!-- Application Header -->
          <div id="header-title">
            <h1>Geodata Explorer</h1>
          </div>

          <div id="header-about">
            <button id="about-btn" title="About the dev. Team">About</button>

            <div id="about-panel" class="hidden-control">
              <h3>CTTC Geodata Explorer</h3>
              <p>Developed by the Geomatics RU & David Casas</p>
              <p>Funded through CTTC intership program - Young Talent Research Stay Program</p>
              <p>Centre Tecnològic de Telecomunicacions de Catalunya (CTTC)</p>

            </div>

          </div>

      </header>
    

    <!-- ============================= 
              MAIN VISUAL CONTAINER 
         ============================= -->

      <!-- Map Container
           The Map creation in src/map/createMap.js
           The addition of the controls and elements in main.js 
      -->
      <div id="map">

        <!-- Slider Control,
            logic handled in src/ui/timeSlider.js
            Shown only when the layer is visible.
            The 'hidden-control' class is toggled via JS.
        -->
        <div id="time-slider-container" class="hidden-control">
          <input type="range" id="time-slider">
          <div id="time-label">Date: ----</div>
        </div>

        
        <!-- Metadata Panel,
            logic handlede in src/ui/metadataPanel.js
            Contains the metadata of the selected dataset 
            in the Data Gallery.
            -->
        <div id="metadata-popup" class="hidden-control">
          <div id="metadata-content"></div>
          <button id="metadata-close">Close</button>
        </div>

        <!-- Spectral Index | Attribute Selector, 
            logic handlede in src/map/layers/data/layerManager.js
            Available only in the "Rice Montioring - NDVI / NDWI" layer.
        -->
        <div id="ndvi-selector" class="hidden-control">
          <label>Variable:</label>
          <select id="ndvi-dropdown">
              <option value="max_ndvi">Max NDVI</option>
              <option value="min_ndwi">Min NDWI</option>
              <option value="ti_ndvi">TI NDVI</option>
          </select>
        </div>
<!--
        <div id="rice-selector" class="hidden-control">
          <label>Variable:</label>
          <select id="rice-dropdown">
              <option value="yieldEsti">Yield Estimation</option>
              <option value="riceVar">Rice Variety</option>
          </select>
        </div>-->


        <!-- Mouse Position Track,
            Update continuously in src/controls/mousePositionControl.js
        -->
        <div id="mouse-position"></div>

        <!-- Popup
            GetFeatureInfo logic handled in src/interactions/popup.js
        -->
        <div id="popup" class="ol-popup">
          <a href="#" id="popup-closer" class="ol-popup-closer"></a>
          <div id="popup-content"></div>
        </div>

        <!-- DrawTools
            Logic handled in src/controls/drawTools.js.
            Visibilitbiey controlled by JS via he `hidden-control` class.
            Displays all the graphic tools.
        -->
        <div id="draw-container">
          <div id="draw-tools" class="hidden-control">
            <button id="draw-point" title="Punto"><i class="fa-solid fa-location-dot"></i></button>
            <button id="draw-line" title="Polilínea"><i class="fa-solid fa-route"></i></button>
            <button id="draw-polygon" title="Polígono"><i class="fa-solid fa-draw-polygon"></i></button>
            <button id="draw-clip" title="Recortar Mapa"><i class="fa-solid fa-scissors"></i></button>
            <button id="draw-clear" title="Borrar Todo" style="background-color: #d90429;"><i class="fa-solid fa-trash"></i></button>
          </div>
          <button id="draw-toggle-button" title="Draw Tools">
            <i class="fa-solid fa-pencil"></i>
          </button>
        </div>

        <!-- Gallery Base Maps
            Logic handled in src/controls/galleryBaseMaps.js.
        -->
        <div id="gallery-container">

          <button id="gallery-toggle-button" title="Basemap Gallery">
            <i class="fa-solid fa-map"></i>
          </button>

          <div id="gallery-panel" class="hidden-control">

            <button class="basemap-card active" data-layer="osm">
              <img src="https://ows.terrestris.de/osm/service?SERVICE=WMS&VERSION=1.3.0&REQUEST=GetMap&LAYERS=OSM-WMS&STYLES=&FORMAT=image/png&CRS=EPSG:3857&BBOX=237000,5066000,246000,5073000&WIDTH=200&HEIGHT=150" alt="OpenStreetMaps">
              <span>OSM</span>
            </button>
            
            <button class="basemap-card" data-layer="topo-gris">
              <img src="https://geoserveis.icgc.cat/servei/catalunya/mapa-base/wms?SERVICE=WMS&VERSION=1.3.0&REQUEST=GetMap&LAYERS=estandard-gris&STYLES=&FORMAT=image/png&CRS=EPSG:3857&BBOX=237000,5066000,246000,5073000&WIDTH=200&HEIGHT=150" alt="Topográfico-Gris">
              <span>Grey Topographic (ICGC)</span>
            </button>

            <button class="basemap-card" data-layer="WI">
              <img src="https://tiles.maps.eox.at/wms?SERVICE=WMS&VERSION=1.3.0&REQUEST=GetMap&LAYERS=s2cloudless-2020_3857&STYLES=&FORMAT=image/jpeg&CRS=EPSG:3857&BBOX=237000,5066000,246000,5073000&WIDTH=200&HEIGHT=150" alt="WorldIm">
              <span>World Imagery</span>
            </button>
            
          </div>
        </div>
      
      <!-- ============================= 
                MAP ACTION BUTTONS 
          ============================= -->

        <div id="map-buttons">
          <!-- Centering Button
              Logic handled in src/controls/recenterButton.js
          -->
          <button id="centrado" title="Centering Button"></button> 
        </div>

      <!-- ============================= 
                  MAPA DATA GALLERY
            ============================= -->
            
        <div id="data-container">
          <button id="data-button-toggle" title="Data Catalog"></button>

          <div id="data-gallery-panel" class="hidden-control">

          </div>
        </div>

        <div id="legend-container" class="legend-panel">
          <h4>Legends</h4>
          <div id="legend-content"></div>
        </div>
      </div>

    <!-- Main application entry point -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
